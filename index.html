<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابعة أيام الأحد والثلاثاء - تصميم كتاب</title>
    <style>
        /* تنسيقات الشاشة الأساسية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #000;
        }
        .no-print-zone {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-print {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-print:hover {
            background-color: #fff;
            color: #000;
        }

        /* حاوية الصفحات لملء الـ A4 بالكامل بالعرض */
        .page {
            width: 297mm;
            height: 210mm;
            margin: 0 auto 20px auto;
            padding: 6mm 8mm;
            box-sizing: border-box;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            position: relative;
            page-break-after: always;
        }

        /* خط القص في المنتصف */
        .cut-line {
            position: absolute;
            left: 50%;
            top: 6mm;
            bottom: 6mm;
            transform: translateX(-50%);
            border-left: 1px dashed #ccc;
            width: 0;
        }

        /* تقسيم الجدولين يمين ويسار (كل نصف يمثل شهراً كاملاً) */
        .month-container {
            width: 48.5%; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .month-title {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 5px;
            border: 2px solid #000;
            padding: 4px;
            background-color: #f9f9f9;
        }

        .table-scroll {
            flex-grow: 1;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #000;
            padding: 3px 5px; 
            text-align: center;
            vertical-align: middle;
            font-size: 11px;
            word-wrap: break-word;
        }

        thead th {
            font-weight: bold;
            background-color: #f0f0f0;
            height: 24px;
        }

        /* تحديد أحجام الخانات بدقة لتكفي الصفحة */
        .day-col {
            width: 18%;
            font-weight: bold;
        }
        .task-col {
            width: 37%;
            height: 13.5mm; /* ارتفاع مناسب جداً للكتابة المريحة ويضمن ملاءمة الشهر بالكامل */
        }
        .check-col {
            width: 8%;
            font-size: 9px;
            font-weight: bold;
        }

        /* تنسيقات خاصة بالطباعة الفورية */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
            }
            .no-print-zone {
                display: none;
            }
            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
                width: 100%;
                height: 100%;
            }
            .cut-line {
                border-left: 1px dashed #000;
            }
            @page {
                size: A4 landscape;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-zone">
        <button class="btn-print" onclick="window.print()">🖨️ طباعة دفتر المتابعة</button>
        <p style="font-size: 13px; color: #555; margin-top: 8px;">
            <strong>طريقة الطباعة:</strong> اختر الطباعة على الوجهين والتقليب على الحافة القصيرة 
            <span dir="ltr">(Flip on Short Edge)</span> ثم قص الأوراق من المنتصف ورتب النصف الأيسر فوق الأيمن.
        </p>
    </div>

    <div id="pages-container"></div>

    <script>
        // دالة لجلب أسماء الأشهر بالعربية ميلادي
        function getMonthNameAr(monthIndex) {
            const months = [
                "يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو",
                "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"
            ];
            return months[monthIndex];
        }

        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("pages-container");
            
            const startDate = new Date(2026, 7, 1); // 1 أغسطس 2026
            const endDate = new Date(2027, 7, 1);   // 1 أغسطس 2027

            // 1. توليد وتجميع الأيام المستهدفة (الأحد والثلاثاء فقط) لكل شهر
            let monthsData = {};
            
            let currentDate = new Date(startDate);
            while (currentDate <= endDate) {
                let dayOfWeek = currentDate.getDay(); // 0 = الأحد, 2 = الثلاثاء
                
                if (dayOfWeek === 0 || dayOfWeek === 2) {
                    let year = currentDate.getFullYear();
                    let month = currentDate.getMonth();
                    let key = `${year}-${month}`;
                    
                    if (!monthsData[key]) {
                        monthsData[key] = {
                            year: year,
                            month: month,
                            days: []
                        };
                    }
                    
                    monthsData[key].days.push({
                        dayName: dayOfWeek === 0 ? "الأحد" : "الثلاثاء",
                        dateStr: `${currentDate.getDate()}/${month + 1}`
                    });
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }

            // تحويل الكائن إلى مصفوفة مرتبة من الأشهر
            let sortedMonths = Object.values(monthsData);
            let totalMonths = sortedMonths.length;

            // 2. تطبيق خوارزمية ترتيب الصفحات (Booklet Layout لـ 4 أشهر في الورقة وش وظهر)
            let printOrder = [];
            for (let chunk = 0; chunk < totalMonths; chunk += 4) {
                // وجه الورقة الأولى: الشهر الحالي (يمين) والشهر الحالي + 2 (يسار)
                printOrder.push([chunk, chunk + 2]);
                // ظهر الورقة الأولى: الشهر الحالي + 1 (يمين) والشهر الحالي + 3 (يسار)
                if (chunk + 1 < totalMonths || chunk + 3 < totalMonths) {
                    printOrder.push([chunk + 1, chunk + 3]);
                }
            }

            // 3. بناء صفحات الطباعة هيدروليكياً بناءً على الترتيب المطلوب
            printOrder.forEach(pair => {
                const page = document.createElement("div");
                page.className = "page";

                const cutLine = document.createElement("div");
                cutLine.className = "cut-line";
                page.appendChild(cutLine);

                for (let i = 0; i < 2; i++) {
                    let monthIndex = pair[i];
                    const monthContainer = document.createElement("div");
                    monthContainer.className = "month-container";

                    // إذا لم تكن هناك بيانات شهر (فارغ في نهاية السنة مثلاً)
                    if (monthIndex === undefined || monthIndex >= totalMonths) {
                        monthContainer.innerHTML = `<div style="text-align:center; margin-top:50mm; color:#ccc; font-weight:bold;">صفحة فارغة للملاحظات</div>`;
                        page.appendChild(monthContainer);
                        continue;
                    }

                    let mData = sortedMonths[monthIndex];
                    let titleText = `جدول متابعة: ${getMonthNameAr(mData.month)} ${mData.year}`;

                    let tableHTML = `
                        <div class="month-title">${titleText}</div>
                        <div class="table-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th class="day-col" rowspan="2">اليوم والتاريخ</th>
                                        <th colspan="2">جدول الحفظ المنهجي</th>
                                        <th colspan="2">جدول الواجبات والمهام</th>
                                    </tr>
                                    <tr>
                                        <th class="task-col">المحتوى / السورة والآيات</th>
                                        <th class="check-col">التمام</th>
                                        <th class="task-col">الواجب والمراجعة</th>
                                        <th class="check-col">التمام</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    // تكرار الأيام الخاصة بهذا الشهر فقط
                    mData.days.forEach(day => {
                        tableHTML += `
                            <tr>
                                <td class="day-col">
                                    ${day.dayName}<br>
                                    <span style="font-size:10px; color:#444; font-weight:normal;">${day.dateStr}</span>
                                </td>
                                <td class="task-col"></td>
                                <td class="check-col">⬜</td>
                                <td class="task-col"></td>
                                <td class="check-col">⬜</td>
                            </tr>
                        `;
                    });

                    tableHTML += `
                                </tbody>
                            </table>
                        </div>
                    `;

                    monthContainer.innerHTML = tableHTML;
                    page.appendChild(monthContainer);
                }

                container.appendChild(page);
            });
        });
    </script>
</body>
</html>
