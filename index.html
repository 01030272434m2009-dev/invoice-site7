<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تعقب الأيام السنوية الاحترافية</title>
    <style>
        /* تنسيقات الشاشة الأساسية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #000;
        }
        .no-print-zone {
            text-align: center;
            margin-bottom: 15px;
        }
        .btn-print {
            padding: 10px 25px;
            font-size: 16px;
            font-weight: bold;
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-print:hover {
            background-color: #fff;
            color: #000;
        }

        /* حاوية الورقة A4 بالعرض لملء الصفحة تماماً */
        .page-a4 {
            width: 297mm;
            height: 210mm;
            margin: 0 auto;
            padding: 6mm 8mm;
            box-sizing: border-box;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        /* عنوان اللوحة */
        .page-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            color: #000;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }

        /* شبكة الدوائر الذكية */
        .circles-grid {
            display: grid;
            /* توزيع 28 عموداً بشكل متساوي ومحكم */
            grid-template-columns: repeat(28, 1fr); 
            gap: 2.2px; /* المسافة بين الدوائر لضمان عدم التداخل */
            justify-content: center;
            align-content: center;
            flex-grow: 1;
        }

        /* تصميم الدائرة الفردية */
        .day-circle {
            aspect-ratio: 1 / 1; /* يضمن بقاء العنصر دائرياً تماماً */
            border: 1px solid #000;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #fff;
            box-sizing: border-box;
            padding: 2px;
        }

        /* نصوص داخل الدائرة بخطوط صغيرة جداً ودقيقة للطباعة */
        .day-name {
            font-size: 6.5px;
            font-weight: bold;
            line-height: 1;
            margin-bottom: 1px;
        }

        .day-date {
            font-size: 6px;
            font-weight: normal;
            color: #333;
            line-height: 1;
        }

        /* تنسيقات خاصة بالطباعة */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
            }
            .no-print-zone {
                display: none;
            }
            .page-a4 {
                margin: 0;
                box-shadow: none;
                width: 100%;
                height: 100%;
            }
            @page {
                size: A4 landscape;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-zone">
        <button class="btn-print" onclick="window.print()">🖨️ طباعة لوحة الدوائر السنوية</button>
    </div>

    <div class="page-a4">
        <div class="page-title">لوحة تعقب الأيام السنوية (2026/08/01 - 2027/08/01)</div>
        <div class="circles-grid" id="grid-container"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const gridContainer = document.getElementById("grid-container");
            const daysNames = ["سبت", "أحد", "إثنين", "ثلاثاء", "أربعاء", "خميس", "جمعة"];
            
            // تحديد النطاق الزمني المطلوب (من 1 أغسطس 2026 إلى 1 أغسطس 2027)
            const startDate = new Date(2026, 7, 1); 
            const endDate = new Date(2027, 7, 1); 

            let currentDate = new Date(startDate);
            let count = 0;

            // حلقة تكرارية لإنشاء الدوائر بناءً على الأيام
            while (currentDate <= endDate) {
                count++;
                
                // جلب اسم اليوم المختصر
                const dayName = daysNames[currentDate.getDay() === 6 ? 0 : currentDate.getDay() + 1];
                
                // صيغة التاريخ (يوم/شهر) لتوفير المساحة داخل الدائرة الصغيرة جداً
                const day = String(currentDate.getDate()).padStart(2, '0');
                const month = String(currentDate.getMonth() + 1).padStart(2, '0');
                const formattedDate = `${day}/${month}`;

                // إنشاء عنصر الدائرة
                const circle = document.createElement("div");
                circle.className = "day-circle";
                circle.title = `اليوم ${count}: ${currentDate.toLocaleDateString('ar-EG')}`; // يظهر عند تمرير الماوس

                circle.innerHTML = `
                    <span class="day-name">${dayName}</span>
                    <span class="day-date">${formattedDate}</span>
                `;

                gridContainer.appendChild(circle);

                // الانتقال لليوم التالي
                currentDate.setDate(currentDate.getDate() + 1);
            }
            
            console.log("إجمالي الأيام التي تم توليدها وطباعتها داخل الدوائر: " + count);
        });
    </script>
</body>
</html>
