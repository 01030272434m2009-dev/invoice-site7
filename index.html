<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD-Maker Pro | منصة صناعة الإعلانات الاحترافية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        :root {
            --bg-main: #090d16;
            --bg-side: #111726;
            --bg-input: #1b2336;
            --accent: #2563eb;
            --accent-hover: #3b82f6;
            --accent-gradient: linear-gradient(135deg, #3b82f6, #7c3aed);
            --text-light: #f8fafc;
            --text-muted: #64748b;
            --border: #24324d;
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* القائمة الجانبية للتحكم */
        .sidebar {
            width: 380px;
            background-color: var(--bg-side);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.3);
        }

        .brand {
            padding: 24px 20px;
            font-size: 22px;
            font-weight: 900;
            text-align: center;
            border-bottom: 1px solid var(--border);
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(180deg, rgba(37,99,235,0.1) 0%, transparent 100%);
        }

        .brand i {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tabs {
            display: flex;
            background: #0b0f19;
            padding: 6px;
            margin: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 12px 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: var(--text-light);
            background: rgba(255,255,255,0.02);
        }

        .tab-btn.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .control-panel {
            flex: 1;
            padding: 0 20px 20px 20px;
            overflow-y: auto;
            display: none;
        }

        .control-panel.active {
            display: block;
        }

        /* تحسين السكرول بار للقائمة */
        .control-panel::-webkit-scrollbar {
            width: 6px;
        }
        .control-panel::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .section-title {
            font-size: 14px;
            color: #94a3b8;
            margin: 20px 0 12px 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            border-right: 3px solid var(--accent);
            padding-right: 8px;
        }

        /* أدوات الرفع والإدخال */
        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #0b0f19;
        }

        .upload-box:hover {
            border-color: var(--accent);
            background: rgba(37, 99, 235, 0.03);
            transform: translateY(-2px);
        }

        .upload-box i {
            font-size: 44px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .upload-box p {
            font-size: 13px;
            color: #94a3b8;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        label {
            display: block;
            font-size: 12px;
            margin-bottom: 6px;
            color: #94a3b8;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px 14px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { 
            background: var(--accent-hover); 
            transform: translateY(-1px);
        }
        .btn:active { transform: translateY(0); }

        .btn-secondary {
            background: #24324d;
            color: #e2e8f0;
        }
        .btn-secondary:hover { background: #2f4164; }

        .btn-success { 
            background: var(--success); 
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
        }
        .btn-success:hover { background: #059669; }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .btn-danger:hover {
            background: var(--danger);
            color: white;
        }

        /* منطقة العمل والعرض الرئيسية */
        .main-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #060911;
            position: relative;
            height: 100%;
        }

        .canvas-container-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
            overflow: auto;
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 24px 24px;
            background-opacity: 0.2;
        }

        /* إصلاح وتحسين محاكي الرندرة والفيديو */
        .video-preview-box {
            position: relative;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            border: 4px solid #1e293b;
            transition: transform 0.1s ease;
        }

        /* الأنيميشن والمؤثرات البصرية للإعلانات - انسيابية وحركية متطورة */
        .effect-float { animation: adv-float 4s infinite alternate ease-in-out; }
        .effect-zoomIn { animation: adv-zoom 5s infinite alternate ease-in-out; }
        .effect-rotate { animation: adv-rotate 12s infinite linear; }
        .effect-flash { animation: adv-flash 2.5s infinite alternate ease-in-out; }

        @keyframes adv-float { 
            0% { transform: translateY(0px) scale(1); } 
            100% { transform: translateY(-15px) scale(1.02); } 
        }
        @keyframes adv-zoom { 
            0% { transform: scale(0.96); } 
            100% { transform: scale(1.06); } 
        }
        @keyframes adv-rotate { 
            from { transform: rotate(0deg) scale(0.95); } 
            to { transform: rotate(360deg) scale(0.95); } 
        }
        @keyframes adv-flash { 
            0% { filter: brightness(0.95) contrast(1); } 
            100% { filter: brightness(1.15) contrast(1.05); } 
        }

        /* شريط التايم لاين السفلي للفيديو */
        .timeline-bar {
            background: var(--bg-side);
            border-top: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .play-btn {
            background: var(--accent-gradient);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            transition: all 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.08);
        }

        .timeline-track {
            flex: 1;
            height: 8px;
            background: #0b0f19;
            border-radius: 6px;
            position: relative;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .timeline-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: var(--accent-gradient);
            border-radius: 6px;
            transition: width 0.1s linear;
        }

        /* شبكة الخلفيات الجاهزة للمنتجات */
        .bg-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .bg-option {
            height: 65px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            background-size: cover;
            background-position: center;
            transition: all 0.2s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        .bg-option:hover { 
            border-color: var(--accent);
            transform: scale(1.04);
        }

        /* أدوات التحكم السريع في العناصر المصممة */
        .layer-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        #imageLoader { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            <span>AD-Maker Pro</span>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('poster-tab', event)"><i class="fa-solid fa-palette"></i> البوستر والأسعار</button>
            <button class="tab-btn" onclick="switchTab('video-tab', event)"><i class="fa-solid fa-video"></i> صناعة الفيديو</button>
        </div>

        <div id="poster-tab" class="control-panel active">
            <div class="section-title"><i class="fa-solid fa-cloud-arrow-up"></i> خطوة 1: صورة المنتج</div>
            <div class="upload-box" onclick="document.getElementById('imageLoader').click()">
                <i class="fa-solid fa-images"></i>
                <p>اسحب أو اختر صورة المنتج هنا</p>
                <input type="file" id="imageLoader" accept="image/*">
            </div>

            <div class="section-title"><i class="fa-solid fa-scissors"></i> خطوة 2: المعالجة والتفريغ</div>
            <button class="btn btn-secondary" onclick="removeBackground()"><i class="fa-solid fa-wand-magic"></i> مسح خلفية المنتج تلقائياً</button>

            <div class="section-title"><i class="fa-solid fa-image"></i> خطوة 3: الخلفية الإعلانية</div>
            <div class="bg-grid">
                <div class="bg-option" style="background: linear-gradient(135deg, #1e3a8a, #3b82f6);" onclick="changeCanvasBg('linear-gradient(135deg, #1e3a8a, #3b82f6)')"></div>
                <div class="bg-option" style="background: linear-gradient(135deg, #111827, #312e81);" onclick="changeCanvasBg('linear-gradient(135deg, #111827, #312e81)')"></div>
                <div class="bg-option" style="background: linear-gradient(135deg, #064e3b, #10b981);" onclick="changeCanvasBg('linear-gradient(135deg, #064e3b, #10b981)')"></div>
                <div class="bg-option" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400');" onclick="changeCanvasBgImg('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800')"></div>
                <div class="bg-option" style="background-image: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=400');" onclick="changeCanvasBgImg('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=800')"></div>
                <div class="bg-option" style="background: #0b0f19;" onclick="changeCanvasBg('#0b0f19')"></div>
            </div>

            <div class="section-title"><i class="fa-solid fa-font"></i> خطوة 4: النصوص والأسعار</div>
            <div class="form-group">
                <label>اسم المنتج التجاري</label>
                <div class="form-row">
                    <input type="text" id="productName" placeholder="مثال: حذاء رياضي فخم">
                    <button class="btn btn-secondary" style="width: auto;" onclick="addText('name')"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label>السعر والشارة</label>
                <div class="form-row">
                    <input type="text" id="productPrice" placeholder="مثال: 499 ج.م">
                    <button class="btn btn-secondary" style="width: auto;" onclick="addText('price')"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>

            <div class="layer-actions">
                <button class="btn btn-danger" onclick="deleteSelected()"><i class="fa-solid fa-trash-can"></i> حذف المحدد</button>
                <button class="btn btn-secondary" onclick="centerSelected()"><i class="fa-solid fa-arrows-to-dot"></i> تملئ المركز</button>
            </div>

            <button class="btn btn-success" style="margin-top: 30px;" onclick="downloadPoster()"><i class="fa-solid fa-download"></i> تحميل البوستر النهائي جاهز</button>
        </div>

        <div id="video-tab" class="control-panel">
            <div class="section-title"><i class="fa-solid fa-wand-magic-sparkles"></i> حركة الإعلان السينمائية</div>
            <div class="form-group">
                <select id="videoEffect" onchange="applyVideoEffect()">
                    <option value="effect-float">🔥 تأثير الطفو والانسياب السينمائي</option>
                    <option value="effect-zoomIn">🔍 تأثير التقريب الذكي (Zoom-In)</option>
                    <option value="effect-rotate">🔄 دوران للمنتج</option>
                    <option value="effect-flash">⚡ وميض وإضاءة الإعلانات السريعة</option>
                </select>
            </div>

            <div class="form-group">
                <label>نص إعلاني متحرك علوي</label>
                <input type="text" id="videoTopText" value="🔥 عرض لفترة محدودة جداً!" oninput="updateLiveText()">
            </div>
            
            <div class="form-group">
                <label>الموسيقى التصويرية الخلفية</label>
                <select>
                    <option>🎵 حماسية للتجارة الإلكترونية (مدمجة)</option>
                    <option>🎵 هادئة للمنتجات الطبية والتجميل</option>
                </select>
            </div>

            <button class="btn" style="background: linear-gradient(135deg, #ec4899, #8b5cf6); box-shadow: 0 4px 14px rgba(236, 72, 153, 0.3);" onclick="triggerVideoExport()"><i class="fa-solid fa-film"></i> رندرة وتوليد فيديو الإعلان MP4</button>
        </div>
    </div>

    <div class="main-workspace">
        <div class="canvas-container-wrapper">
            <div class="video-preview-box effect-float" id="videoBox">
                <canvas id="adCanvas" width="500" height="500"></canvas>
            </div>
        </div>

        <div class="timeline-bar">
            <button class="play-btn" id="playBtn" onclick="toggleTimeline()"><i class="fa-solid fa-play"></i></button>
            <div style="font-size: 13px; color: #94a3b8; white-space: nowrap;">معاينة الحركة الحية:</div>
            <div class="timeline-track" onclick="seekTimeline(event)">
                <div class="timeline-progress" id="timelineProgress"></div>
            </div>
            <div style="font-size: 13px; font-weight: bold; min-width: 70px; text-align: left;" id="timeCounter">0.00 ث</div>
        </div>
    </div>

    <script>
        // إعداد الـ Canvas الخاص بـ Fabric.js
        const canvas = new fabric.Canvas('adCanvas');
        let productImgObject = null;
        let isPlaying = false;
        let timelineInterval = null;
        let currentProgress = 0;

        // لون مبدئي احترافي غامق
        canvas.backgroundColor = '#1e3a8a';
        canvas.renderAll();

        // 1. التعامل مع رفع الصور وضبط الأحجام تلقائياً
        document.getElementById('imageLoader').addEventListener('change', function (e) {
            const reader = new FileReader();
            reader.onload = function (event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function () {
                    if(productImgObject) canvas.remove(productImgObject);
                    
                    productImgObject = new fabric.Image(imgObj);
                    productImgObject.scaleToWidth(280);
                    productImgObject.set({
                        left: 110,
                        top: 110,
                        cornerColor: '#2563eb',
                        cornerSize: 12,
                        transparentCorners: false,
                        borderColor: '#3b82f6'
                    });
                    canvas.add(productImgObject);
                    canvas.setActiveObject(productImgObject);
                    canvas.renderAll();
                }
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // 2. ميزة معالجة اللون وقص الخلفية
        function removeBackground() {
            if (!productImgObject) {
                alert("برجاء رفع صورة المنتج أولاً لتفريغها.");
                return;
            }
            
            // تطبيق فلتر إزالة الخلفية البيضاء الأساسي
            productImgObject.filters.push(new fabric.Image.filters.RemoveColor({
                threshold: 0.15,
                color: '#ffffff'
            }));
            productImgObject.applyFilters();
            canvas.renderAll();
        }

        // 3. تغيير الخلفيات الإعلانية
        function changeCanvasBg(colorCSS) {
            canvas.backgroundImage = null;
            canvas.backgroundColor = colorCSS;
            canvas.renderAll();
        }

        function changeCanvasBgImg(url) {
            fabric.Image.fromURL(url, function(img) {
                img.set({
                    width: 500,
                    height: 500,
                    originX: 'left',
                    originY: 'top'
                });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
            }, { crossOrigin: 'anonymous' });
        }

        // 4. إضافة نصوص وأسعار احترافية مناسبة للخطوط العربية
        function addText(type) {
            let textValue = "";
            let textOptions = {};

            if (type === 'name') {
                textValue = document.getElementById('productName').value || "منتج رائع جديد";
                textOptions = {
                    left: 50,
                    top: 400,
                    fontSize: 26,
                    fontWeight: 'bold',
                    fill: '#ffffff',
                    fontFamily: 'Cairo',
                    textAlign: 'right'
                };
            } else if (type === 'price') {
                textValue = document.getElementById('productPrice').value || "السعر مفاجأة";
                textOptions = {
                    left: 330,
                    top: 40,
                    fontSize: 20,
                    fontWeight: '900',
                    fill: '#ffffff',
                    backgroundColor: '#10b981',
                    padding: 8,
                    fontFamily: 'Cairo',
                    borderRadius: 6
                };
            }

            const text = new fabric.IText(textValue, textOptions);
            canvas.add(text);
            canvas.setActiveObject(text);
            canvas.renderAll();
        }

        // حذف العنصر المختار سريعا
        function deleteSelected() {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                canvas.remove(activeObject);
                canvas.renderAll();
            }
        }

        // توسيط العنصر المختار
        function centerSelected() {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.center();
                activeObject.setCoords();
                canvas.renderAll();
            }
        }

        // 5. تبديل القوائم الجانبية بسلاسة
        function switchTab(tabId, event) {
            document.querySelectorAll('.control-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 6. تطبيق مؤثرات الفيديو على الكانفاس (المحاكي الحركي)
        function applyVideoEffect() {
            const effect = document.getElementById('videoEffect').value;
            const wrapper = document.getElementById('videoBox');
            
            wrapper.classList.remove('effect-float', 'effect-zoomIn', 'effect-rotate', 'effect-flash');
            wrapper.classList.add(effect);
        }

        // 7. تشغيل التايم لاين والمحاكاة الحية
        function toggleTimeline() {
            const progress = document.getElementById('timelineProgress');
            const playIcon = document.getElementById('playBtn').querySelector('i');
            const timeCounter = document.getElementById('timeCounter');
            
            if (isPlaying) {
                clearInterval(timelineInterval);
                playIcon.className = "fa-solid fa-play";
                isPlaying = false;
            } else {
                playIcon.className = "fa-solid fa-pause";
                isPlaying = true;
                
                timelineInterval = setInterval(() => {
                    if (currentProgress >= 100) {
                        currentProgress = 0;
                    } else {
                        currentProgress += 1;
                    }
                    progress.style.width = currentProgress + '%';
                    timeCounter.innerText = ((currentProgress / 100) * 5).toFixed(2) + " ث";
                }, 50);
            }
        }

        function seekTimeline(e) {
            const track = e.currentTarget;
            const rect = track.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            currentProgress = Math.floor((clickX / width) * 100);
            document.getElementById('timelineProgress').style.width = currentProgress + '%';
            document.getElementById('timeCounter').innerText = ((currentProgress / 100) * 5).toFixed(2) + " ث";
        }

        // 8. تحميل البوستر كصورة PNG عالية الدقة
        function downloadPoster() {
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1.0
            });
            const link = document.createElement('a');
            link.download = 'Ad-Poster-Pro.png';
            link.href = dataURL;
            link.click();
        }

        function triggerVideoExport() {
