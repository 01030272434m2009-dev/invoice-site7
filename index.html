<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة التحميل العالمية الاحترافية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0b0f19;         /* Deep Night Blue */
            --card-bg: #151d30;         /* Graphite */
            --border-color: #242f4d;    /* Slate border */
            --accent-primary: #2563eb;  /* Premium Blue */
            --accent-hover: #3b82f6;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --success-glow: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            transition: all 0.25s ease-in-out;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-card {
            width: 100%;
            max-width: 680px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 45px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14.5px;
            margin-bottom: 40px;
        }

        .input-box-wrapper {
            margin-bottom: 30px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-size: 14px;
            color: #94a3b8;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 20px;
            border: 2px solid var(--border-color);
            background: #090d16;
            border-radius: 16px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            text-align: left;
            direction: ltr;
        }

        input[type="text"]:focus {
            border-color: var(--accent-hover);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.15);
        }

        .btn-premium {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-primary), #1d4ed8);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-premium:hover {
            background: linear-gradient(135deg, var(--accent-hover), var(--accent-primary));
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }

        /* إطار دمج المحرك المستقر داخل الموقع */
        .engine-frame-container {
            display: none;
            margin-top: 30px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: #090d16;
            padding: 10px;
        }

        iframe {
            width: 100%;
            height: 480px;
            border: none;
            border-radius: 12px;
        }

        .status-panel {
            margin-top: 20px;
            padding: 15px;
            background: #090d16;
            border-radius: 16px;
            border: 1px dashed var(--border-color);
            display: none;
            color: var(--success-glow);
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h1>محرك المعالجة والتحميل الفوري للويب</h1>
        <p class="subtitle">نظام هجين متطور فلات لتحميل الفيديوهات الكبيرة وقوائم التشغيل مباشرة إلى الكمبيوتر</p>

        <div class="input-box-wrapper">
            <label for="videoUrl">ضع رابط يوتيوب المراد تحميله:</label>
            <input type="text" id="videoUrl" placeholder="قم بلصق رابط الفيديو أو الـ Playlist هنا..." autocomplete="off">
        </div>

        <button class="btn-premium" id="actionBtn" onclick="initiateWebEngine()">بدء المعالجة واستخراج روابط الحفظ</button>

        <div class="status-panel" id="statusPanel">
            ✨ تم الاتصال بمصفوفة فك التشفير بنجاح! اختر الجودة ومسار الحفظ من اللوحة بالأسفل:
        </div>

        <div class="engine-frame-container" id="engineFrameContainer">
            <iframe id="downloadEngine" src=""></iframe>
        </div>
    </div>

    <script {
        function initiateWebEngine() {
            const rawUrl = document.getElementById('videoUrl').value.trim();
            const actionBtn = document.getElementById('actionBtn');
            const statusPanel = document.getElementById('statusPanel');
            const frameContainer = document.getElementById('engineFrameContainer');
            const downloadEngine = document.getElementById('downloadEngine');

            if (!rawUrl) {
                alert('من فضلك ضع رابط صحيح أولاً!');
                return;
            }

            actionBtn.disabled = true;
            statusPanel.style.display = 'block';
            
            // استخدام نظام الاستدعاء الهجين المستقر للتحميل المباشر بجودات متعددة وصوت
            // هذا المحرك مخصص للمطورين ليعمل داخل الـ iframe بأمان تامة وبدون مشاكل CORS
            const targetUrl = encodeURIComponent(rawUrl);
            downloadEngine.src = `https://twdown.onrender.com/api/widget?url=${targetUrl}`;

            // بديل احترافي فوري في حال تعطل الخادم الأول
            // downloadEngine.src = `https://loader.to/api/card/?url=${targetUrl}&f=mp4`;

            setTimeout(() => {
                frameContainer.style.display = 'block';
                actionBtn.disabled = false;
            }, 1000);
        }
    } </script>
</body>
</html>
