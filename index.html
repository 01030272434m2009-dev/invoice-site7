<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكسر الصوت الاحترافي | بنظام الهندسة الصوتية</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --panel-color: #161f33;
            --accent-blue: #00d2ff;
            --accent-green: #00ff88;
            --text-color: #e2e8f0;
            --metallic-grad: linear-gradient(145deg, #23314f, #111a2e);
            --border-metal: 1px solid #2d3d5a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .mixer-container {
            background: var(--metallic-grad);
            border: var(--border-metal);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 1000px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        h1 {
            text-align: center;
            color: var(--accent-blue);
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: var(--border-metal);
            padding-bottom: 15px;
        }

        .mixer-hardware {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .channel-strip {
            background: var(--panel-color);
            border: var(--border-metal);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);
        }

        .channel-title {
            font-weight: bold;
            color: var(--accent-blue);
            margin-bottom: 15px;
            font-size: 16px;
        }

        /* تصميم البكرات الدائرية والمنزلقات */
        .control-group {
            width: 100%;
            margin-bottom: 15px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 12px;
            color: #8a99ad;
            margin-bottom: 5px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #0d1527;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-blue);
            transition: 0.2s;
        }

        /* أزرار التحكم */
        .btn {
            background: #1e2942;
            color: var(--text-color);
            border: var(--border-metal);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .btn.active {
            background: var(--accent-green);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }

        /* مؤشر الصوت LED VU Meter */
        .meter-container {
            width: 100%;
            height: 15px;
            background: #0d1527;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            margin-top: 10px;
        }

        .meter-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-green) 70%, #ff3366 90%);
            transition: width 0.05s linear;
        }

        .file-input-wrapper {
            position: relative;
            width: 100%;
        }

        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="mixer-container">
    <h1>🎛️ نظام التحكم الصوتي المطور للـمساجد والمناسبات</h1>
    
    <div class="mixer-hardware">
        
        <div class="channel-strip">
            <div class="channel-title">🎤 입력 | الميكروفون</div>
            <button class="btn" id="micToggleBtn">تفعيل الميكروفون</button>
            
            <div class="control-group" style="margin-top: 15px;">
                <label>حجم صوت المايك</label>
                <input type="range" id="micVolume" min="0" max="2" step="0.1" value="1">
            </div>

            <div class="control-group">
                <label>تنقية الصوت (Noise Gate)</label>
                <input type="range" id="noiseFilter" min="20" max="20000" step="10" value="20000">
            </div>
        </div>

        <div class="channel-strip">
            <div class="channel-title">💫 Effects | صدى الصوت (المحاكاة)</div>
            
            <div class="control-group">
                <label>عمق الصدى (Delay Time)</label>
                <input type="range" id="echoDelay" min="0" max="1" step="0.05" value="0.3">
            </div>

            <div class="control-group">
                <label>تكرار الصدى (Feedback)</label>
                <input type="range" id="echoFeedback" min="0" max="0.9" step="0.05" value="0.4">
            </div>

            <div class="control-group">
                <label>مستوى تأثير الصدى (Mix)</label>
                <input type="range" id="echoLevel" min="0" max="1" step="0.05" value="0.5">
            </div>
        </div>

        <div class="channel-strip">
            <div class="channel-title">🎵 Background | الملفات والخلفية</div>
            <div class="file-input-wrapper">
                <button class="btn">إدراج ملف صوتي</button>
                <input type="file" id="audioFile" accept="audio/*">
            </div>
            
            <audio id="bgAudio" loop></audio>
            <button class="btn" id="playAudioBtn">تشغيل الخلفية</button>

            <div class="control-group" style="margin-top: 15px;">
                <label>حجم صوت الموسيقى/الخلفية</label>
                <input type="range" id="bgVolume" min="0" max="1" step="0.05" value="0.5">
            </div>
        </div>

        <div class="channel-strip">
            <div class="channel-title">🎚️ Master | التحكم الرئيسي والأمان</div>
            
            <div class="control-group">
                <label>حجم الصوت الرئيسي (Master)</label>
                <input type="range" id="masterVolume" min="0" max="1.5" step="0.05" value="1">
            </div>

            <div class="control-group">
                <label>حماية السماعات (Limiter)</label>
                <span style="font-size: 11px; color: var(--accent-green);">نشط تلقائياً لحماية النظام</span>
            </div>

            <div class="control-group">
                <label>مؤشر إشارة الصوت VU</label>
                <div class="meter-container">
                    <div class="meter-bar" id="vuMeter"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    let audioCtx = null;
    let micStream = null;
    let micSource = null;
    let bgSource = null;

    // عقد المعالجة الصوتية
    let micGain, bgGain, masterGain, delayNode, feedbackGain, echoMixGain, filterNode, limiterNode, analyzerNode;

    const micToggleBtn = document.getElementById('micToggleBtn');
    const playAudioBtn = document.getElementById('playAudioBtn');
    const bgAudio = document.getElementById('bgAudio');
    const audioFileInput = document.getElementById('audioFile');
    const vuMeter = document.getElementById('vuMeter');

    // تهيئة نظام الـ Web Audio
    function initAudio() {
        if (audioCtx) return;
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // عقد التحكم في الصوت
        micGain = audioCtx.createGain();
        bgGain = audioCtx.createGain();
        masterGain = audioCtx.createGain();
        
        // عقد الصدى (Echo/Delay)
        delayNode = audioCtx.createDelay(1.0);
        feedbackGain = audioCtx.createGain();
        echoMixGain = audioCtx.createGain();

        // فلاتر التنقية (LowPass لمنع الوميض والترددات الحادة)
        filterNode = audioCtx.createBiquadFilter();
        filterNode.type = "lowpass";

        // حماية السماعات من الانفجار الصوتي (Limiter)
        limiterNode = audioCtx.createDynamicsCompressor();
        limiterNode.threshold.setValueAtTime(-4, audioCtx.currentTime); // قفل الصوت عند حد آمن
        limiterNode.knee.setValueAtTime(0, audioCtx.currentTime);
        limiterNode.ratio.setValueAtTime(20, audioCtx.currentTime);
        limiterNode.attack.setValueAtTime(0.005, audioCtx.currentTime);
        limiterNode.release.setValueAtTime(0.05, audioCtx.currentTime);

        // تحليل الصوت للمؤشر الـ VU
        analyzerNode = audioCtx.createAnalyser();
        analyzerNode.fftSize = 64;

        // ربط مسار الصدى (Feedback Loop)
        delayNode.connect(feedbackGain);
        feedbackGain.connect(delayNode);
        
        // ربط التحكم بالقيم الابتدائية من عناصر التحكم
        updateParameters();

        // ربط المكسر النهائي
        masterGain.connect(limiterNode);
        limiterNode.connect(analyzerNode);
        analyzerNode.connect(audioCtx.destination);

        // ربط صوت الخلفية
        bgSource = audioCtx.createMediaElementSource(bgAudio);
        bgSource.connect(bgGain);
        bgGain.connect(masterGain);

        // تشغيل مؤشر الـ VU
        drawMeter();
    }

    function updateParameters() {
        if (!audioCtx) return;
        micGain.gain.value = document.getElementById('micVolume').value;
        bgGain.gain.value = document.getElementById('bgVolume').value;
        masterGain.gain.value = document.getElementById('masterVolume').value;
        
        delayNode.delayTime.value = document.getElementById('echoDelay').value;
        feedbackGain.gain.value = document.getElementById('echoFeedback').value;
        echoMixGain.gain.value = document.getElementById('echoLevel').value;
        
        filterNode.frequency.value = document.getElementById('noiseFilter').value;
    }

    // تفعيل المايك والربط مع تأثير الصدى والفلاتر
    micToggleBtn.addEventListener('click', async () => {
        initAudio();
        if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
        }

        if (!micStream) {
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false, // نغلق إلغاء الصدى التلقائي للمتصفح لنصنع الصدى الخاص بنا
                        noiseSuppression: true,
                        autoGainControl: false
                    } 
                });
                
                micSource = audioCtx.createMediaStreamSource(micStream);
                
                // ربط المايك بالفلتر ثم الجين الرئيسي
                micSource.connect(filterNode);
                filterNode.connect(micGain);
                
                // ربط المايك بمسار الصدى ومسار الصوت المباشر (Dry/Wet)
                micGain.connect(masterGain); // الصوت المباشر
                micGain.connect(delayNode);  // إلى وحدة الصدى
                delayNode.connect(echoMixGain);
                echoMixGain.connect(masterGain); // ربط خرج الصدى بالماستر

                micToggleBtn.textContent = "إيقاف الميكروفون";
                micToggleBtn.classList.add('active');
            } catch (err) {
                alert('يرجى السماح بالوصول للميكروفون: ' + err);
            }
        } else {
            micStream.getTracks().forEach(track => track.stop());
            micStream = null;
            micToggleBtn.textContent = "تفعيل الميكروفون";
            micToggleBtn.classList.remove('active');
        }
    });

    // التعامل مع ملف الصوت الخلفي
    audioFileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            bgAudio.src = URL.createObjectURL(file);
            playAudioBtn.disabled = false;
        }
    });

    playAudioBtn.addEventListener('click', () => {
        initAudio();
        if (bgAudio.paused) {
            bgAudio.play();
            playAudioBtn.textContent = "إيقاف مؤقت للخلفية";
            playAudioBtn.classList.add('active');
        } else {
            bgAudio.pause();
            playAudioBtn.textContent = "تشغيل الخلفية";
            playAudioBtn.classList.remove('active');
        }
    });

    // تحديث الإعدادات فور تحريك البكرات والمنزلقات
    document.querySelectorAll('input[type="range"]').forEach(input => {
        input.addEventListener('input', updateParameters);
    });

    // تحديث ورسم مؤشر الصوت الـ VU Meter
    function drawMeter() {
        requestAnimationFrame(drawMeter);
        if (!analyzerNode) return;
        
        const array = new Uint8Array(analyzerNode.frequencyBinCount);
        analyzerNode.getByteFrequencyData(array);
        
        let values = 0;
        const length = array.length;
        for (let i = 0; i < length; i++) {
            values += array[i];
        }
        
        const average = values / length;
        // تحويل النسبة لشكل مرئي
        vuMeter.style.width = Math.min(100, (average * 1.8)) + '%';
    }
</script>

</body>
</html>
