<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ جداول المهام الأسبوعية</title>
    <style>
        /* تنسيقات الشاشة الأساسية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #000;
        }
        .no-print-zone {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-print {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-print:hover {
            background-color: #fff;
            color: #000;
        }

        /* حاوية الصفحات */
        .page {
            width: 297mm; /* عرض ورقة A4 */
            height: 210mm; /* ارتفاع ورقة A4 بالعرض */
            margin: 0 auto 20px auto;
            padding: 10mm;
            box-sizing: border-box;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            position: relative;
            page-break-after: always;
        }

        /* منطقة القص في المنتصف */
        .cut-line {
            position: absolute;
            left: 50%;
            top: 5mm;
            bottom: 5mm;
            transform: translateX(-50%);
            border-left: 1px dashed #ccc;
            width: 0;
        }

        /* تقسيم الجدولين يمين ويسار */
        .table-container {
            width: 48%; /* كل جدول يأخذ أقل من نصف الصفحة */
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th, td {
            border: 1px solid #000;
            padding: 4px;
            text-align: center;
            vertical-align: middle;
            font-size: 12px;
            word-wrap: break-word;
        }

        .main-title {
            font-weight: bold;
            font-size: 14px;
            height: 35px;
            background-color: #fff;
        }

        .header-row th {
            font-weight: bold;
            font-size: 12px;
            height: 25px;
            background-color: #fff;
        }

        .day-column {
            width: 35%;
            font-weight: bold;
            font-size: 11px;
            line-height: 1.4;
            background-color: #fff;
        }

        .task-column {
            width: 65%;
            height: 55px; /* ارتفاع خانة الكتابة */
        }

        /* تنسيقات خاصة بالطباعة فقط */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
            }
            .no-print-zone {
                display: none; /* إخفاء زر الطباعة أثناء الطباعة */
            }
            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
                width: 100%;
                height: 100%;
            }
            .cut-line {
                border-left: 1px dashed #000; /* جعل خط القص واضح في الطباعة */
            }
            /* إجبار المتصفح على الطباعة بالعرض وأبيض وأسود */
            @page {
                size: A4 landscape;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-zone">
        <button class="btn-print" onclick="window.print()">🖨️ اضغط هنا لطباعة الجداول</button>
    </div>

    <div id="pages-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("pages-container");
            const daysNames = ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];
            
            // إعداد التواريخ
            const startDate = new Date(2026, 7, 1); // 1 أغسطس 2026 (الشهور تبدأ من 0)
            const endDate = new Date(2027, 6, 20);  // 20 يوليو 2027
            
            const totalWeeks = 45;
            let currentDayDate = new Date(startDate);

            // إنشاء الصفحات والجداول (كل لفة تصنع صفحة تحتوي على جدولين)
            for (let weekNum = 1; weekNum <= totalWeeks; weekNum += 2) {
                
                // إنشاء صفحة A4 جديدة
                const page = document.createElement("div");
                page.className = "page";

                // إضافة خط القص في المنتصف
                const cutLine = document.createElement("div");
                cutLine.className = "cut-line";
                page.appendChild(cutLine);

                // بناء الجدول الأيمن (الأسبوع الحالي) والجدول الأيسر (الأسبوع التالي)
                for (let i = 0; i < 2; i++) {
                    let activeWeek = weekNum + i;
                    if (activeWeek > totalWeeks) break; // التوقف إذا تجاوزنا 45 أسبوعاً

                    const tableContainer = document.createElement("div");
                    tableContainer.className = "table-container";

                    let tableHTML = `
                        <table>
                            <thead>
                                <tr class="main-title">
                                    <th colspan="2">جدول المهام الأسبوعية - الأسبوع « ${activeWeek} »</th>
                                </tr>
                                <tr class="header-row">
                                    <th>اليوم والتاريخ والعداد</th>
                                    <th>المهام والملحوظات اليومية</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    // بناء الـ 7 أيام للجدول
                    for (let d = 0; d < 7; d++) {
                        // حساب التاريخ الحالي
                        let dayTime = new Date(startDate.getTime() + (((activeWeek - 1) * 7) + d) * 24 * 60 * 60 * 1000);
                        
                        // تنسيق التاريخ YYYY/MM/DD
                        let yyyy = dayTime.getFullYear();
                        let mm = String(dayTime.getMonth() + 1).padStart(2, '0');
                        let dd = String(dayTime.getDate()).padStart(2, '0');
                        let formattedDate = `${yyyy}/${mm}/${dd}`;

                        // حساب العدادات
                        let daysPassed = Math.floor((dayTime - startDate) / (1000 * 60 * 60 * 24));
                        let daysRemaining = Math.floor((endDate - dayTime) / (1000 * 60 * 60 * 24));
                        if (daysRemaining < 0) daysRemaining = 0;

                        tableHTML += `
                            <tr>
                                <td class="day-column">
                                    ${daysNames[d]}<br>${formattedDate}<br>
                                    <span style="font-size: 9px; font-weight: normal;">مضى: ${daysPassed} | متبقي: ${daysRemaining}</span>
                                </td>
                                <td class="task-column"></td>
                            </tr>
                        `;
                    }

                    tableHTML += `
                            </tbody>
                        </table>
                    `;

                    tableContainer.innerHTML = tableHTML;
                    page.appendChild(tableContainer);
                }

                container.appendChild(page);
            }
        });
    </script>
</body>
</html>
