<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام طباعة دفاتر المتابعة الاحترافي - كشكول حقيقي</title>
    <style>
        /* تنسيقات الواجهة العصرية */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --bg-color: #f4f6f9;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        .control-dashboard {
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: #fff;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 5px solid var(--accent-color);
        }

        .dashboard-title {
            margin: 0 0 15px 0;
            font-size: 24px;
            font-weight: bold;
        }

        .system-selector {
            display: inline-flex;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            border-radius: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .radio-btn {
            display: none;
        }

        .system-label {
            padding: 10px 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .radio-btn:checked + .system-label {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 2px 10px rgba(22, 160, 133, 0.4);
        }

        .btn-print-pro {
            display: block;
            margin: 0 auto;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            background-color: #fff;
            color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-print-pro:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .instruction-badge {
            display: inline-block;
            margin-top: 15px;
            font-size: 13px;
            background: rgba(255,255,255,0.15);
            padding: 6px 15px;
            border-radius: 5px;
            color: #e0e0e0;
            max-width: 600px;
            line-height: 1.5;
        }

        #pages-container {
            padding: 10px;
        }

        /* تحسينات جودة وأبعاد المعاينة لمنع أي هدر أو تداخل */
        .page {
            width: 297mm;
            height: 210mm;
            margin: 0 auto 30px auto;
            padding: 8mm 10mm;
            box-sizing: border-box;
            background: #fff;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            position: relative;
            border-radius: 4px;
            page-break-after: always;
        }

        .cut-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            transform: translateX(-50%);
            border-left: 1px dashed #ccc;
            width: 0;
        }

        .month-container {
            width: 47%; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: flex-start;
        }

        .month-title {
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
            border: 2px solid #2c3e50;
            padding: 5px;
            background-color: #f8f9fa;
            color: #2c3e50;
            border-radius: 4px;
        }

        .table-scroll {
            flex-grow: 1;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1.5px solid #000; /* زيادة السمك لجودة طباعة ممتازة */
            padding: 5px 4px; 
            text-align: center;
            vertical-align: middle;
            font-size: 11px;
        }

        thead th {
            font-weight: bold;
            background-color: #f2f4f4 !important;
            color: #2c3e50;
        }

        .day-col { width: 22%; font-weight: bold; }
        .task-col { width: 34%; height: 12mm; }
        .check-col { width: 10%; font-size: 11px; }

        /* ===================================================
           إعدادات الطباعة الاحترافية العالية الجودة (HD Print)
        ====================================================== */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
                margin: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .control-dashboard {
                display: none;
            }
            .page {
                margin: 0;
                box-shadow: none;
                width: 297mm;
                height: 210mm;
                max-width: 297mm;
                max-height: 210mm;
                border-radius: 0;
                position: relative;
                box-sizing: border-box;
            }
            .cut-line {
                border-left: 1px dashed #999;
            }
            @page {
                size: A4 landscape;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="control-dashboard">
        <h1 class="dashboard-title">🗂️ لوحة تحكم طباعة الدفاتر المنهجية (ترتيب الكشكول التلقائي)</h1>
        
        <div class="system-selector">
            <input type="radio" id="sys1" name="systemType" value="1" class="radio-btn" checked onchange="switchSystem()">
            <label for="sys1" class="system-label">نظام (الأحد - الثلاثاء)</label>

            <input type="radio" id="sys2" name="systemType" value="2" class="radio-btn" onchange="switchSystem()">
            <label for="sys2" class="system-label">نظام (السبت - الإثنين)</label>
        </div>

        <button class="btn-print-pro" onclick="window.print()">🖨️ ابدأ الطباعة الفورية</button>
        
        <div class="instruction-badge">
            <strong>💡 طريقة الحجم والكشكول الذكي:</strong><br>
            اطبع الأوراق (وجه وضهر) مباشرة دون تغيير ترتيبها. عند خروج الأوراق، ضعها فوق بعضها كما هي، ثم اثنِ المجموعة كاملة من المنتصف ودبسها لتجد الكشكول مرتباً تلقائياً من الشهر الأول للأخير!
        </div>
    </div>

    <div id="pages-container"></div>

    <script>
        function getMonthNameAr(monthIndex) {
            const months = ["يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو", "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"];
            return months[monthIndex];
        }

        function generateNotebook(systemId) {
            const container = document.getElementById("pages-container");
            container.innerHTML = ""; 
            
            const startDate = new Date(2026, 7, 1); // 1 أغسطس 2026
            const endDate = new Date(2027, 7, 1);   // 1 أغسطس 2027

            let monthsData = [];
            let currentDate = new Date(startDate);
            let tempMonths = {};

            // تصفية الأيام بناءً على النظام المختار
            while (currentDate <= endDate) {
                let dayOfWeek = currentDate.getDay(); 
                let isTargetDay = false;
                let dayName = "";

                if (systemId === 1) {
                    if (dayOfWeek === 0) { isTargetDay = true; dayName = "الأحد"; }
                    if (dayOfWeek === 2) { isTargetDay = true; dayName = "الثلاثاء"; }
                } else {
                    if (dayOfWeek === 6) { isTargetDay = true; dayName = "السبت"; }
                    if (dayOfWeek === 1) { isTargetDay = true; dayName = "الإثنين"; }
                }
                
                if (isTargetDay) {
                    let year = currentDate.getFullYear();
                    let month = currentDate.getMonth();
                    let key = `${year}-${month}`;
                    
                    if (!tempMonths[key]) {
                        tempMonths[key] = { year: year, month: month, days: [] };
                    }
                    
                    tempMonths[key].days.push({
                        dayName: dayName,
                        dateStr: `${currentDate.getDate()}/${month + 1}`
                    });
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }

            let sortedMonths = Object.values(tempMonths);
            
            // لإتمام خوارزمية الكشكول (Booklet)، يجب أن يكون إجمالي عدد الصفحات (الشهور) مضاعفاً للرقم 4
            // إذا لم يكن مضاعفاً لـ 4، نقوم بإضافة صفحات فارغة للملاحظات في نهاية الدفتر حتى يكتمل العدد تماماً ولا يحدث أي هدر
            while (sortedMonths.length % 4 !== 0) {
                sortedMonths.push({ isBlank: true });
            }

            let totalPages = sortedMonths.length;
            let printOrder = [];

            // خوارزمية فرض الصفحات الذكية للكراسات المطبوعة (Booklet Imposition Algorithm)
            // تقرن الصفحة الأولى بالأخيرة، والثانية بقبل الأخيرة مع مراعاة اتجاه الكتابة العربي (اليمين واليسار) لثني الكشكول
            let left = 0;
            let right = totalPages - 1;

            for (let p = 0; p < totalPages / 2; p++) {
                if (p % 2 === 0) {
                    // الوجه (الأوراق الفردية): الصفحة الأخيرة على اليمين، والأولى على اليسار لتبدأ من اليمين عند الفتح
                    printOrder.push({ right: sortedMonths[right], left: sortedMonths[left] });
                } else {
                    // الظهر (الأوراق الزوجية): الصفحة الثانية على اليمين، وقبل الأخيرة على اليسار
                    printOrder.push({ right: sortedMonths[left], left: sortedMonths[right] });
                }
                left++;
                right--;
            }

            // بناء هيدروليكي للصفحات بناءً على الترتيب الفعلي للكشكول
            printOrder.forEach(pair => {
                const page = document.createElement("div");
                page.className = "page";

                const cutLine = document.createElement("div");
                cutLine.className = "cut-line";
                page.appendChild(cutLine);

                // طباعة الجزء الأيمن ثم الأيسر بالترتيب الصحيح
                [pair.right, pair.left].forEach(mData => {
                    const monthContainer = document.createElement("div");
                    monthContainer.className = "month-container";

                    if (!mData || mData.isBlank) {
                        monthContainer.innerHTML = `<div style="text-align:center; margin-top:60mm; color:#7f8c8d; border: 2px dashed #bdc3c7; padding: 20px; border-radius:8px; font-weight:bold; font-size:14px;">📝 صفحة فارغة<br><span style="font-size:11px; font-weight:normal; color:#95a5a6;">للملاحظات والتقييم الشهري والواجبات الإضافية</span></div>`;
                        page.appendChild(monthContainer);
                        return;
                    }

                    let titleText = `جدول متابعة الحفظ والواجبات: ${getMonthNameAr(mData.month)} ${mData.year}`;

                    let tableHTML = `
                        <div class="month-title">${titleText}</div>
                        <div class="table-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th class="day-col" rowspan="2">اليوم والتاريخ</th>
                                        <th colspan="2">جدول الحفظ المنهجي</th>
                                        <th colspan="2">جدول الواجبات والمهام</th>
                                    </tr>
                                    <tr>
                                        <th class="task-col">المحتوى / السورة والآيات</th>
                                        <th class="check-col">التمام</th>
                                        <th class="task-col">الواجب والمراجعة</th>
                                        <th class="check-col">التمام</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    mData.days.forEach(day => {
                        tableHTML += `
                            <tr>
                                <td class="day-col">
                                    ${day.dayName}<br>
                                    <span style="font-size:10px; color:#444; font-weight:normal;">${day.dateStr}</span>
                                </td>
                                <td class="task-col"></td>
                                <td class="check-col">⬜</td>
                                <td class="task-col"></td>
                                <td class="check-col">⬜</td>
                            </tr>
                        `;
                    });

                    tableHTML += `
                                </tbody>
                            </table>
                        </div>
                    `;

                    monthContainer.innerHTML = tableHTML;
                    page.appendChild(monthContainer);
                });

                container.appendChild(page);
            });
        }

        function switchSystem() {
            const systemVal = document.querySelector('input[name="systemType"]:checked').value;
            generateNotebook(parseInt(systemVal));
        }

        document.addEventListener("DOMContentLoaded", function() {
            generateNotebook(1);
        });
    </script>
</body>
</html>
