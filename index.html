<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام طباعة دفاتر المتابعة الاحترافي</title>
    <style>
        /* تنسيقات الواجهة العصرية */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --bg-color: #f4f6f9;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #333;
        }

        /* الفورم الأنيق للتحكم */
        .control-dashboard {
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: #fff;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 5px solid var(--accent-color);
        }

        .dashboard-title {
            margin: 0 0 15px 0;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .system-selector {
            display: inline-flex;
            background: rgba(255,255,255,0.1);
            padding: 5px;
            border-radius: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .radio-btn {
            display: none;
        }

        .system-label {
            padding: 10px 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .radio-btn:checked + .system-label {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 2px 10px rgba(22, 160, 133, 0.4);
        }

        .btn-print-pro {
            display: block;
            margin: 0 auto;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            background-color: #fff;
            color: var(--primary-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-print-pro:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        }

        .instruction-badge {
            display: inline-block;
            margin-top: 15px;
            font-size: 13px;
            background: rgba(255,255,255,0.15);
            padding: 6px 15px;
            border-radius: 5px;
            color: #e0e0e0;
        }

        /* حاوية الأوراق لمعاينتها في الشاشة */
        #pages-container {
            padding: 10px;
        }

        .page {
            width: 297mm;
            height: 210mm;
            margin: 0 auto 30px auto;
            padding: 6mm 8mm;
            box-sizing: border-box;
            background: #fff;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            position: relative;
            border-radius: 4px;
        }

        .cut-line {
            position: absolute;
            left: 50%;
            top: 6mm;
            bottom: 6mm;
            transform: translateX(-50%);
            border-left: 1px dashed #bbb;
            width: 0;
        }

        .month-container {
            width: 48.5%; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .month-title {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
            border: 2px solid #2c3e50;
            padding: 5px;
            background-color: #f8f9fa;
            color: #2c3e50;
            border-radius: 4px;
        }

        .table-scroll {
            flex-grow: 1;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #333;
            padding: 4px 5px; 
            text-align: center;
            vertical-align: middle;
            font-size: 11px;
        }

        thead th {
            font-weight: bold;
            background-color: #eaeded;
            color: #2c3e50;
        }

        .day-col { width: 20%; font-weight: bold; }
        .task-col { width: 35%; height: 13.5mm; }
        .check-col { width: 10%; font-size: 10px; }

        /* تلوين تمييزي خفيف حسب النظام الفعال للرؤية البصرية */
        .system-1-active thead th { background-color: #eaeded; }
        .system-2-active thead th { background-color: #e8f8f5; }

        /* ===================================================
           تنسيقات وإعدادات الطباعة الاحترافية والقلب التلقائي
        ====================================================== */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
            }
            .control-dashboard {
                display: none; /* إخفاء الفورم تماماً عند الطباعة */
            }
            .page {
                margin: 0;
                box-shadow: none;
                width: 100vw;
                height: 100vh;
                page-break-after: always;
                border-radius: 0;
            }
            .cut-line {
                border-left: 1px dashed #000;
            }

            /* الحل السحري: قلب الصفحة الثانية (الظهر) تلقائياً 180 درجة */
            /* هذا يجعل الأوراق تخرج متناسقة ومعدولة تماماً أياً كانت طريقة قلب الطابعة */
            .page:nth-child(even) {
                transform: rotate(180deg);
            }

            @page {
                size: A4 landscape;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="control-dashboard">
        <h1 class="dashboard-title">🗂️ لوحة تحكم طباعة الدفاتر المنهجية</h1>
        
        <div class="system-selector">
            <input type="radio" id="sys1" name="systemType" value="1" class="radio-btn" checked onchange="switchSystem()">
            <label for="sys1" class="system-label">نظام (الأحد - الثلاثاء)</label>

            <input type="radio" id="sys2" name="systemType" value="2" class="radio-btn" onchange="switchSystem()">
            <label for="sys2" class="system-label">نظام (السبت - الإثنين)</label>
        </div>

        <button class="btn-print-pro" onclick="window.print()">🖨️ ابدأ الطباعة الفورية</button>
        
        <div class="instruction-badge">
            ℹ️ النظام يقوم تلقائياً بقلب صفحات الظهر برمجياً لضمان خروج الكشكول معدولاً عند الثني والتدبيس.
        </div>
    </div>

    <div id="pages-container" class="system-1-active"></div>

    <script>
        function getMonthNameAr(monthIndex) {
            const months = [
                "يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو",
                "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"
            ];
            return months[monthIndex];
        }

        function generateNotebook(systemId) {
            const container = document.getElementById("pages-container");
            container.innerHTML = ""; // تنظيف المحتوى السابق

            // تحديث كلاس التنسيق البصري
            if(systemId === 1) {
                container.className = "system-1-active";
            } else {
                container.className = "system-2-active";
            }
            
            const startDate = new Date(2026, 7, 1); // 1 أغسطس 2026
            const endDate = new Date(2027, 7, 1);   // 1 أغسطس 2027

            let monthsData = {};
            let currentDate = new Date(startDate);

            // تصفية الأيام بناءً على النظام المختار
            while (currentDate <= endDate) {
                let dayOfWeek = currentDate.getDay(); 
                let isTargetDay = false;
                let dayName = "";

                if (systemId === 1) {
                    // نظام الأحد (0) والثلاثاء (2)
                    if (dayOfWeek === 0) { isTargetDay = true; dayName = "الأحد"; }
                    if (dayOfWeek === 2) { isTargetDay = true; dayName = "الثلاثاء"; }
                } else {
                    // نظام السبت (6) والإثنين (1)
                    if (dayOfWeek === 6) { isTargetDay = true; dayName = "السبت"; }
                    if (dayOfWeek === 1) { isTargetDay = true; dayName = "الإثنين"; }
                }
                
                if (isTargetDay) {
                    let year = currentDate.getFullYear();
                    let month = currentDate.getMonth();
                    let key = `${year}-${month}`;
                    
                    if (!monthsData[key]) {
                        monthsData[key] = { year: year, month: month, days: [] };
                    }
                    
                    monthsData[key].days.push({
                        dayName: dayName,
                        dateStr: `${currentDate.getDate()}/${month + 1}`
                    });
                }
                currentDate.setDate(currentDate.getDate() + 1);
            }

            let sortedMonths = Object.values(monthsData);
            let totalMonths = sortedMonths.length;

            // خوارزمية ترتيب الصفحات الذكية (كراسة متتالية وش وظهر)
            let printOrder = [];
            for (let chunk = 0; chunk < totalMonths; chunk += 4) {
                printOrder.push([chunk, chunk + 2]); // الوجه الأول
                if (chunk + 1 < totalMonths || chunk + 3 < totalMonths) {
                    printOrder.push([chunk + 1, chunk + 3]); // الظهر الأول (الذي سيتم قلبه تلقائياً)
                }
            }

            // بناء هيدروليكي للصفحات للطباعة والمعاينة
            printOrder.forEach(pair => {
                const page = document.createElement("div");
                page.className = "page";

                const cutLine = document.createElement("div");
                cutLine.className = "cut-line";
                page.appendChild(cutLine);

                for (let i = 0; i < 2; i++) {
                    let monthIndex = pair[i];
                    const monthContainer = document.createElement("div");
                    monthContainer.className = "month-container";

                    if (monthIndex === undefined || monthIndex >= totalMonths) {
                        monthContainer.innerHTML = `<div style="text-align:center; margin-top:50mm; color:#bbb; font-weight:bold; font-size:14px;">صفحة فارغة للملاحظات والتقييم</div>`;
                        page.appendChild(monthContainer);
                        continue;
                    }

                    let mData = sortedMonths[monthIndex];
                    let titleText = `جدول متابعة الحفظ والواجبات: ${getMonthNameAr(mData.month)} ${mData.year}`;

                    let tableHTML = `
                        <div class="month-title">${titleText}</div>
                        <div class="table-scroll">
                            <table>
                                <thead>
                                    <tr>
                                        <th class="day-col" rowspan="2">اليوم والتاريخ</th>
                                        <th colspan="2">جدول الحفظ المنهجي</th>
                                        <th colspan="2">جدول الواجبات والمهام</th>
                                    </tr>
                                    <tr>
                                        <th class="task-col">المحتوى / السورة والآيات</th>
                                        <th class="check-col">التمام</th>
                                        <th class="task-col">الواجب والمراجعة</th>
                                        <th class="check-col">التمام</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    mData.days.forEach(day => {
                        tableHTML += `
                            <tr>
                                <td class="day-col">
                                    ${day.dayName}<br>
                                    <span style="font-size:10px; color:#555; font-weight:normal;">${day.dateStr}</span>
                                </td>
                                <td class="task-col"></td>
                                <td class="check-col">⬜</td>
                                <td class="task-col"></td>
                                <td class="check-col">⬜</td>
                            </tr>
                        `;
                    });

                    tableHTML += `
                                </tbody>
                            </table>
                        </div>
                    `;

                    monthContainer.innerHTML = tableHTML;
                    page.appendChild(monthContainer);
                }

                container.appendChild(page);
            });
        }

        // تابع لتبديل الأنظمة من خلال الفورم
        function switchSystem() {
            const systemVal = document.querySelector('input[name="systemType"]:checked').value;
            generateNotebook(parseInt(systemVal));
        }

        // تشغيل النظام الأول افتراضياً بمجرد فتح الصفحة
        document.addEventListener("DOMContentLoaded", function() {
            generateNotebook(1);
        });
    </script>
</body>
</html>
