<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منشئ جداول المهام الأسبوعية الاحترافي</title>
    <style>
        /* تنسيقات الشاشة الأساسية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #000;
        }
        .no-print-zone {
            text-align: center;
            margin-bottom: 20px;
        }
        .btn-print {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-print:hover {
            background-color: #fff;
            color: #000;
        }

        /* حاوية الصفحات لملء الـ A4 بالكامل بالعرض */
        .page {
            width: 297mm;
            height: 210mm;
            margin: 0 auto 20px auto;
            padding: 5mm 7mm; /* تقليل الهوامش الخارجية لزيادة مساحة الجدول */
            box-sizing: border-box;
            background: #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            position: relative;
            page-break-after: always;
        }

        /* خط القص في المنتصف */
        .cut-line {
            position: absolute;
            left: 50%;
            top: 5mm;
            bottom: 5mm;
            transform: translateX(-50%);
            border-left: 1px dashed #ccc;
            width: 0;
        }

        /* تقسيم الجدولين يمين ويسار بأقصى عرض ممكن */
        .table-container {
            width: 48.5%; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            flex-grow: 1; /* جعل الجدول يمتد لملء المساحة الطولية المتاحة */
        }

        th, td {
            border: 1px solid #000;
            padding: 4px;
            text-align: center;
            vertical-align: middle;
            font-size: 12px;
            word-wrap: break-word;
        }

        .main-title {
            font-weight: bold;
            font-size: 13px;
            height: 28px;
        }

        .header-row th {
            font-weight: bold;
            font-size: 11px;
            height: 22px;
        }

        /* تصغير خانة اليوم والتاريخ والعداد لتكون على المقاس تماماً */
        .day-column {
            width: 18%; /* تم تقليصها إلى 18% لتناسب التاريخ والعداد دون زيادة */
            font-weight: bold;
            font-size: 10px;
            line-height: 1.2;
            white-space: nowrap; /* يمنع النص الأساسي من الانقسام غير المتناسق */
        }

        /* توسيع خانة المهام لأقصى مساحة عرضية وطولية ممكنة */
        .task-column {
            width: 82%; /* تم رفعها إلى 82% للاستفادة الكاملة من المساحة */
            height: 22mm; /* زيادة الارتفاع الطولي لكل خانة مهام لملء الورقة تماماً */
        }

        /* سطر ملاحظات الأسبوع أسفل الجدول */
        .week-notes {
            margin-top: 5px;
            border: 1px solid #000;
            height: 12mm; /* مساحة مناسبة لكتابة الملاحظات */
            width: 100%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            padding-right: 8px;
            font-size: 11px;
            font-weight: bold;
            text-align: right;
        }

        /* تنسيقات خاصة بالطباعة الفورية */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
            }
            .no-print-zone {
                display: none;
            }
            .page {
                margin: 0;
                box-shadow: none;
                page-break-after: always;
                width: 100%;
                height: 100%;
            }
            .cut-line {
                border-left: 1px dashed #000;
            }
            @page {
                size: A4 landscape;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="no-print-zone">
        <button class="btn-print" onclick="window.print()">🖨️ اضغط هنا لطباعة الجداول</button>
    </div>

    <div id="pages-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("pages-container");
            const daysNames = ["السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة"];
            
            const startDate = new Date(2026, 7, 1); // 1 أغسطس 2026
            const endDate = new Date(2027, 6, 20);  // 20 يوليو 2027
            const totalWeeks = 45;

            for (let weekNum = 1; weekNum <= totalWeeks; weekNum += 2) {
                
                const page = document.createElement("div");
                page.className = "page";

                const cutLine = document.createElement("div");
                cutLine.className = "cut-line";
                page.appendChild(cutLine);

                for (let i = 0; i < 2; i++) {
                    let activeWeek = weekNum + i;
                    if (activeWeek > totalWeeks) break;

                    const tableContainer = document.createElement("div");
                    tableContainer.className = "table-container";

                    let tableHTML = `
                        <div>
                            <table>
                                <thead>
                                    <tr class="main-title">
                                        <th colspan="2">جدول المهام الأسبوعية - الأسبوع « ${activeWeek} »</th>
                                    </tr>
                                    <tr class="header-row">
                                        <th class="day-column">اليوم والتاريخ</th>
                                        <th class="task-column">المهام والملحوظات اليومية</th>
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    for (let d = 0; d < 7; d++) {
                        let dayTime = new Date(startDate.getTime() + (((activeWeek - 1) * 7) + d) * 24 * 60 * 60 * 1000);
                        
                        let yyyy = dayTime.getFullYear();
                        let mm = String(dayTime.getMonth() + 1).padStart(2, '0');
                        let dd = String(dayTime.getDate()).padStart(2, '0');
                        let formattedDate = `${yyyy}/${mm}/${dd}`;

                        let daysPassed = Math.floor((dayTime - startDate) / (1000 * 60 * 60 * 24));
                        let daysRemaining = Math.floor((endDate - dayTime) / (1000 * 60 * 60 * 24));
                        if (daysRemaining < 0) daysRemaining = 0;

                        tableHTML += `
                            <tr>
                                <td class="day-column">
                                    <strong>${daysNames[d]}</strong><br>${formattedDate}<br>
                                    <span style="font-size: 8px; font-weight: normal; color: #333; display: block; white-space: nowrap;">مضى: ${daysPassed} | متبقي: ${daysRemaining}</span>
                                </td>
                                <td class="task-column"></td>
                            </tr>
                        `;
                    }

                    tableHTML += `
                                </tbody>
                            </table>
                            <div class="week-notes">ملاحظات الأسبوع:</div>
                        </div>
                    `;

                    tableContainer.innerHTML = tableHTML;
                    page.appendChild(tableContainer);
                }

                container.appendChild(page);
            }
        });
    </script>
</body>
</html>
