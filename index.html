<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محمل يوتيوب المباشر والسريع</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;        /* نايت بلو داكن */
            --card-bg: #1e293b;         /* جرافيت ناعم */
            --accent-color: #3b82f6;     /* أزرق مودرن */
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 2px solid #334155;
            background: #0f172a;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
            text-align: left;
            direction: ltr;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--accent-color);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.99);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        /* شاشة الانتظار وحالة التحميل */
        .status-container {
            margin-top: 25px;
            display: none;
        }

        .loader {
            margin: 15px auto;
            border: 4px solid #334155;
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .status-success {
            color: var(--success-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>تحميل مباشر من يوتيوب</h1>
        <p class="subtitle">ضع الرابط وسيتم التحميل تلقائياً إلى جهازك (يدعم الفيديوهات الكبيرة وقوائم التشغيل)</p>

        <div class="input-group">
            <label for="videoUrl">رابط الفيديو أو قائمة التشغيل:</label>
            <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
        </div>

        <button class="btn" id="downloadBtn" onclick="startDirectDownload()">تحميل الفيديو الآن</button>

        <div class="status-container" id="statusContainer">
            <div class="loader" id="loader"></div>
            <div class="status-text" id="statusText">جاري تجهيز الملف في الخلفية...</div>
        </div>
    </div>

    <script>
        async function startDirectDownload() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const downloadBtn = document.getElementById('downloadBtn');
            const statusContainer = document.getElementById('statusContainer');
            const loader = document.getElementById('loader');
            const statusText = document.getElementById('statusText');

            if (!urlInput) {
                alert('من فضلك أدخل رابط يوتيوب أولاً!');
                return;
            }

            // قفل الزر وإظهار مؤشر التحميل في الخلفية
            downloadBtn.disabled = true;
            statusContainer.style.display = 'block';
            loader.style.display = 'block';
            statusText.className = 'status-text';
            statusText.innerText = 'جاري الاتصال بالمحرك الخلفي واستخراج الفيديو بأعلى جودة...';

            try {
                // استخدام سيرفر معالجة يعتمد على كود Cobalt المتطور في الخلفية
                const response = await fetch('https://api.cobalt.tools/', {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: urlInput,
                        videoQuality: '1080', // تحميل بأعلى جودة متاحة حتى 1080p
                        downloadMode: 'auto'  // يتعرف تلقائياً إذا كان فيديو أو قائمة تشغيل
                    })
                });

                const result = await response.json();

                if (result.status === 'stream' || result.status === 'redirect') {
                    statusText.innerText = 'تم التجهيز بنجاح! يبدأ التحميل المباشر إلى جهازك الآن...';
                    
                    // كود التحميل التلقائي الصامت والمباشر إلى الكمبيوتر
                    const downloadLink = document.createElement('a');
                    downloadLink.href = result.url;
                    
                    // هذا السطر يخبر المتصفح ببدء التحميل فوراً كملف
                    downloadLink.setAttribute('download', ''); 
                    document.body.appendChild(downloadLink);
                    downloadLink.click();
                    document.body.removeChild(downloadLink);

                    // تحديث الواجهة عند النجاح
                    loader.style.display = 'none';
                    statusText.className = 'status-text status-success';
                    statusText.innerText = '✨ اكتمل التوجيه! تفقد التحميلات في متصفحك أو نافذة الحفظ.';
                } else if (result.status === 'picker') {
                    // في حال كانت قائمة تشغيل (Playlist) كبيرة، السيرفر يعيد روابط الفيديوهات كلها فوراً لتبدأ معاً
                    statusText.innerText = 'تم العثور على قائمة تشغيل، جاري بدء تحميل الفيديوهات متتالية...';
                    
                    result.picker.forEach((item, index) => {
                        setTimeout(() => {
                            const playlistLink = document.createElement('a');
                            playlistLink.href = item.url;
                            playlistLink.setAttribute('download', '');
                            document.body.appendChild(playlistLink);
                            playlistLink.click();
                            document.body.removeChild(playlistLink);
                        }, index * 1500); // فاصل زمني ثانية ونصف بين كل فيديو لمنع المتصفح من حظر التحميل المتعدد
                    });

                    loader.style.display = 'none';
                    statusText.className = 'status-text status-success';
                    statusText.innerText = '✨ بدأ تحميل قائمة التشغيل كاملة في الخلفية!';
                } else {
                    throw new Error('السيرفر لم يستطع معالجة هذا الرابط.');
                }

            } catch (error) {
                loader.style.display = 'none';
                statusText.className = 'status-text';
                statusText.innerText = '❌ حدث خطأ أثناء التحميل. تأكد من صحة الرابط أو حاول مجدداً.';
                console.error(error);
            } finally {
                // إعادة تفعيل الزر بعد فترة قصيرة
                setTimeout(() => {
                    downloadBtn.disabled = false;
                }, 3000);
            }
        }
    </script>
</body>
</html>
