<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة صناعة الإعلانات البيطرية الاحترافية | Vet-AD Studio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

    <style>
        :root {
            --bg-dark: #070b12;
            --bg-card: #0f1624;
            --bg-input: #172033;
            --primary: #10b981;
            --secondary: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --border: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: 420px;
            background-color: var(--bg-card);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .header-title {
            padding: 20px;
            font-size: 18px;
            font-weight: 900;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(37, 99, 235, 0.1) 0%, transparent 100%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header-title i { color: var(--primary); }

        .panel-scroll { flex: 1; padding: 20px; overflow-y: auto; }
        .panel-scroll::-webkit-scrollbar { width: 6px; }
        .panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .section-tag {
            font-size: 13px;
            color: var(--primary);
            margin: 20px 0 10px 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grid-bgs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .bg-card-opt {
            height: 85px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: all 0.2s ease;
        }
        .bg-card-opt:hover { border-color: var(--primary); transform: scale(1.02); }
        .bg-card-opt span {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            font-size: 11px;
            text-align: center;
            padding: 4px 0;
            color: #fff;
            border-bottom-left-radius: 6px;
            border-bottom-right-radius: 6px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
        input, select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            transition: border 0.2s;
        }
        input:focus, select:focus { border-color: var(--secondary); outline: none; }

        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2);
            transition: all 0.2s;
        }
        .btn-action:hover { opacity: 0.95; transform: translateY(-1px); }

        .btn-sub {
            background: #1e293b;
            color: #cbd5e1;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        .btn-sub:hover { background: #2d3748; }

        .workspace { flex: 1; display: flex; flex-direction: column; background-color: #030508; position: relative; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .preview-window {
            border: 6px solid #1e293b;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            position: relative;
        }

        .timeline-controls {
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .btn-play {
            background: var(--primary);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }

        .track-container { flex: 1; height: 10px; background: #0b111e; border-radius: 5px; position: relative; border: 1px solid var(--border); }
        .track-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: linear-gradient(90deg, var(--secondary), var(--primary)); border-radius: 5px; }
        
        .floating-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 12px;
            z-index: 5;
            display: none;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header-title">
            <i class="fa-solid fa-clapperboard"></i>
            <span>استوديو الإعلانات البيطرية المحترف</span>
        </div>
        
        <div class="panel-scroll">
            <div class="section-tag"><i class="fa-solid fa-images"></i> 1: اختر خلفية الإعلان البيطرية</div>
            <div class="grid-bgs">
                <div class="bg-card-opt" style="background-image: url('https://images.unsplash.com/photo-1570042225831-d98fa7577f1e?q=80&w=300');" onclick="setAdBackground('https://images.unsplash.com/photo-1570042225831-d98fa7577f1e?q=80&w=800')"><span>مزارع وتسمين مواشي</span></div>
                <div class="bg-card-opt" style="background-image: url('https://images.unsplash.com/photo-1516467508483-a7212febe31a?q=80&w=300');" onclick="setAdBackground('https://images.unsplash.com/photo-1516467508483-a7212febe31a?q=80&w=800')"><span>خلفية طبية بيطرية</span></div>
                <div class="bg-card-opt" style="background-image: url('https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?q=80&w=300');" onclick="setAdBackground('https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?q=80&w=800')"><span>بورصة وعنابر دواجن</span></div>
                <div class="bg-card-opt" style="background-image: url('https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=300');" onclick="setAdBackground('https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=800')"><span>حيوانات أليفة ممتازة</span></div>
            </div>

            <div class="section-tag"><i class="fa-solid fa-file-medical"></i> 2: الهوية وبيانات التواصل بالصيدلية</div>
            <div class="input-group">
                <label>اسم الصيدلية / الدكتور</label>
                <input type="text" id="vetTitle" value="صيدلية د. أحمد البيطرية">
            </div>
            <div class="input-group">
                <label>أرقام التليفونات للتواصل</label>
                <input type="text" id="vetPhones" value="ت: 01000000000 / 0120000000">
            </div>
            <div class="input-group">
                <label>العنوان بالتفصيل</label>
                <input type="text" id="vetLoc" value="الشرقية - فاقوس - بجوار مجلس المدينة">
            </div>

            <div class="section-tag"><i class="fa-solid fa-layer-group"></i> 3: سيناريو فقرات الفيديو التلقائي</div>
            <div class="input-group">
                <label>الفقرة الأولى (ثانية 0 - 2): الترحيب والهوية</label>
                <input type="text" id="sc1" value="أهلاً بكم في صيدلية الدكتور أحمد البيطرية بفاقوس">
            </div>
            <div class="input-group">
                <label>الفقرة الثانية (ثانية 2 - 4): عرض العلاج والمفاجأة</label>
                <input type="text" id="sc2" value="أقوى التحصينات والأدوية لزيادة الوزن والإنتاج!">
            </div>
            <div class="input-group">
                <label>الفقرة الثالثة (ثانية 4 - 6): العناوين والاتصال</label>
                <input type="text" id="sc3" value="تواصلوا معنا الآن .. متواجدون لخدمتكم دائماً">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-sub" style="flex:1;" onclick="applyDataToCanvas()"><i class="fa-solid fa-arrows-rotate"></i> تحديث البوستر الحالي</button>
                <button class="btn-sub" style="color: #ef4444;" onclick="clearCanvasItems()"><i class="fa-solid fa-trash"></i> مسح شامل</button>
            </div>
            
            <br>
            <button class="btn-action" onclick="startVideoExport()"><i class="fa-solid fa-video"></i> توليد وتحميل الفيديو الإعلاني MP4</button>
        </div>
    </div>

    <div class="workspace">
        <div class="canvas-area">
            <div class="preview-window">
                <div class="floating-badge" id="liveBadge">🔴 جاري تسجيل الفيديو المولد...</div>
                <canvas id="mainStudioCanvas" width="550" height="550"></canvas>
            </div>
        </div>

        <div class="timeline-controls">
            <button class="btn-play" id="masterPlayBtn" onclick="runVideoTimeline()"><i class="fa-solid fa-play"></i></button>
            <div style="font-size: 13px; color: #94a3b8; min-width: 90px;">معاينة الفقرات الحية:</div>
            <div class="track-container">
                <div class="track-fill" id="trackBar"></div>
            </div>
            <div style="font-size: 14px; font-weight: bold; color: var(--primary);" id="timerText">0.00 ثانية</div>
        </div>
    </div>

    <audio id="bgMusicTrack" loop src="https://actions.google.com/sounds/v1/ambiences/morning_birds_in_the_park.ogg"></audio>

    <script>
        const canvas = new fabric.Canvas('mainStudioCanvas');
        let timelineRunning = false;
        let timeIndex = 0;
        let animationFrameId = null;
        let mediaRecorder = null;
        let recordedChunks = [];

        // إعداد مظهر الكانفاس الأساسي
        canvas.backgroundColor = '#0b121f';
        
        // نصوص ثابتة لتحديثها ديناميكياً خلال الفيديو
        let textTop, textMiddle, textBottom;

        function initCanvasTexts() {
            canvas.clear();
            canvas.backgroundColor = '#0b121f';

            textTop = new fabric.Text('', {
                left: 275, top: 60, originX: 'center',
                fontSize: 24, fontWeight: '900', fill: '#10b981',
                fontFamily: 'Cairo', textAlign: 'center', shadow: '2px 2px 8px rgba(0,0,0,0.8)'
            });

            textMiddle = new fabric.Text('', {
                left: 275, top: 250, originX: 'center',
                fontSize: 22, fontWeight: '700', fill: '#ffffff',
                fontFamily: 'Cairo', textAlign: 'center', backgroundColor: 'rgba(7, 11, 18, 0.85)',
                padding: 10, borderRadius: 8, shadow: '2px 2px 10px rgba(0,0,0,0.9)'
            });

            textBottom = new fabric.Text('', {
                left: 275, top: 460, originX: 'center',
                fontSize: 15, fontWeight: 'bold', fill: '#cbd5e1',
                fontFamily: 'Cairo', textAlign: 'center', backgroundColor: '#2563eb',
                padding: 8, shadow: '2px 2px 6px rgba(0,0,0,0.8)'
            });

            canvas.add(textTop, textMiddle, textBottom);
            applyDataToCanvas();
        }

        function setAdBackground(url) {
            fabric.Image.fromURL(url, function(img) {
                img.set({ width: 550, height: 550, originX: 'left', originY: 'top' });
                canvas.setBackgroundImage(img, canvas.renderAll.bind(canvas));
            }, { crossOrigin: 'anonymous' });
        }

        function applyDataToCanvas() {
            if(!textTop) return;
            textTop.text = document.getElementById('vetTitle').value;
            textMiddle.text = document.getElementById('sc1').value; // الافتراضية للفقرة الأولى
            textBottom.text = document.getElementById('vetPhones').value + " \n " + document.getElementById('vetLoc').value;
            canvas.renderAll();
        }

        function clearCanvasItems() {
            document.getElementById('vetTitle').value = "";
            document.getElementById('vetPhones').value = "";
            document.getElementById('vetLoc').value = "";
            initCanvasTexts();
        }

        // تشغيل ومعاينة خط زمني حقيقي للفقرات الـ 3 مع الصوت والموسيقى
        function runVideoTimeline() {
            const playIcon = document.getElementById('masterPlayBtn').querySelector('i');
            const audio = document.getElementById('bgMusicTrack');

            if (timelineRunning) {
                timelineRunning = false;
                playIcon.className = "fa-solid fa-play";
                audio.pause();
                cancelAnimationFrame(animationFrameId);
            } else {
                timelineRunning = true;
                playIcon.className = "fa-solid fa-pause";
                audio.play().catch(() => console.log("Audio play deferred"));
                timeIndex = 0;
                animateStep();
            }
        }

        function animateStep() {
            if (!timelineRunning) return;

            timeIndex += 0.02; // زيادة الوقت بمعدل الإطار
            if (timeIndex >= 6.0) timeIndex = 0; // إعادة الفيديو بعد 6 ثواني تلقائياً

            const percentage = (timeIndex / 6.0) * 100;
            document.getElementById('trackBar').style.width = percentage + '%';
            document.getElementById('timerText').innerText = timeIndex.toFixed(2) + " ثانية";

            // تحريك النصوص والفقرات بناءً على التوقيت الصحيح للإعلان
            if (timeIndex < 2.0) {
                textMiddle.text = document.getElementById('sc1').value;
                textMiddle.set({ fill: '#ffffff', scaleX: 1 + Math.sin(timeIndex*3)*0.03, scaleY: 1 + Math.sin(timeIndex*3)*0.03 });
            } else if (timeIndex >= 2.0 && timeIndex < 4.0) {
                textMiddle.text = document.getElementById('sc2').value;
                textMiddle.set({ fill: '#10b981', scaleX: 1 + Math.cos(timeIndex*3)*0.04, scaleY: 1 + Math.cos(timeIndex*3)*0.04 });
            } else {
                textMiddle.text = document.getElementById('sc3').value;
                textMiddle.set({ fill: '#3b82f6', scaleX: 1, scaleY: 1 });
            }

            canvas.renderAll();
            animationFrameId = requestAnimationFrame(animateStep);
        }

        // تسجيل الكانفاس حياً وتوليد الفيديو وتحميله فوراً للمستخدم
        function startVideoExport() {
            document.getElementById('liveBadge').style.display = 'block';
            recordedChunks = [];
            
            // تهيئة خط التايم لاين من البداية للتسجيل النظيف
            timelineRunning = true;
            timeIndex = 0;
            document.getElementById('bgMusicTrack').play();

            const canvasStream = document.getElementById('mainStudioCanvas').captureStream(30); // 30 إطار في الثانية
            
            // دمج الصوت والموسيقى مع كليب الفيديو النازل
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const audioTrack = document.getElementById('bgMusicTrack');
            const source = audioContext.createMediaElementSource(audioTrack);
            const dest = audioContext.createMediaStreamDestination();
            source.connect(dest);
            source.connect(audioContext.destination);
            
            if(dest.stream.getAudioTracks().length > 0) {
                canvasStream.addTrack(dest.stream.getAudioTracks()[0]);
            }

            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm;codecs=vp9' });
            
            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = function() {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'Vet-Commercial-Ad.webm';
                a.click();
                
                document.getElementById('liveBadge').style.display = 'none';
                alert("🚀 تم توليد الفيديو الإعلاني المخصص لصيدليتك بالفقرات والموسيقى بنجاح وجاري تحميله الآن!");
            };

            mediaRecorder.start();
            animateStep();

            // إيقاف التسجيل تلقائياً بعد انتهاء دورة الإعلان بالكامل (6 ثواني)
            setTimeout(() => {
                timelineRunning = false;
                mediaRecorder.stop();
                document.getElementById('bgMusicTrack').pause();
                cancelAnimationFrame(animationFrameId);
                document.getElementById('masterPlayBtn').querySelector('i').className = "fa-solid fa-play";
            }, 6000);
        }

        // تشغيل أولي تلقائي
        window.onload = function() {
            initCanvasTexts();
            // خلفية مزارع افتراضية فخمة للبدء بها
            setAdBackground('https://images.unsplash.com/photo-1570042225831-d98fa7577f1e?q=80&w=800');
        };
    </script>
</body>
</html>
